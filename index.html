<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>KickAnalytics</title>
</head>
<body>

<h1>KickAnalytics</h1>

<button onclick="show('regarder')">👁 Regarder</button>
<button onclick="show('jouer')">🎮 Jouer</button>

<div id="section-regarder" style="display:none">
  <h2>Regarder</h2>
  <p id="status">Déconnecté</p>
  <p>Rouge : <span id="scoreRed">0</span> — Bleu : <span id="scoreBlue">0</span></p>
  <p>x=<span id="sX">—</span> y=<span id="sY">—</span> conf=<span id="sConf">—</span> latence=<span id="sLat">—</span></p>
</div>

<div id="section-jouer" style="display:none">
  <h2>Jouer</h2>
  <a href="/camera.html"><button>📷 Caméra</button></a>
  <a href="/controller.html"><button>🎛 Contrôleur</button></a>
</div>

<script>
let ws = null;

function show(section)
{
  document.getElementById('section-regarder').style.display = 'none';
  document.getElementById('section-jouer').style.display    = 'none';
  document.getElementById(`section-${section}`).style.display = 'block';
	if (section === 'regarder') connect();
  if (section === 'jouer') disconnect();
}

function connect()
{
  if (ws) return;
  const proto = window.location.protocol === 'https:' ? 'wss' : 'ws';
  ws = new WebSocket(`${proto}://${window.location.host}/`);

  ws.onopen = () => document.getElementById('status').textContent = 'Connecté ✓';

  ws.onclose = () => {
    ws = null;
    document.getElementById('status').textContent = 'Déconnecté';
  };

  ws.onmessage = (e) => {
    console.log(e.data);
    const d = JSON.parse(e.data);
    if (d.type === 'camera_ready') {
      document.getElementById('status').textContent = '📱 Caméra prête';
    }
    if (d.type === 'calibration_ok') {
      document.getElementById('status').textContent = '🟢 Match en cours';
    }
    if (d.type === 'position') {
      if (d.ts) document.getElementById('sLat').textContent = (Date.now() - d.ts) + 'ms';
      document.getElementById('sX').textContent    = d.x?.toFixed(3) ?? '—';
      document.getElementById('sY').textContent    = d.y?.toFixed(3) ?? '—';
      document.getElementById('sConf').textContent = d.conf != null ? Math.round(d.conf*100) + '%' : '—';
      if (d.score) {
        document.getElementById('scoreRed').textContent  = d.score.red;
        document.getElementById('scoreBlue').textContent = d.score.blue;
      }
    }
    if (d.type === 'goal') {
      alert(d.team === 'red' ? '🔴 BUT Rouge !' : '🔵 BUT Bleu !');
      if (d.score) {
        document.getElementById('scoreRed').textContent  = d.score.red;
        document.getElementById('scoreBlue').textContent = d.score.blue;
      }
    }
    if (d.type === 'score') {
      document.getElementById('scoreRed').textContent  = d.score.red;
      document.getElementById('scoreBlue').textContent = d.score.blue;
    }
  };
}

function disconnect()
{
  ws?.close();
  ws = null;
}
</script>
</body>
</html>
