<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Contrôleur</title>
</head>
<body>

<h2>BabyFoot — Contrôleur</h2>

<p id="status">Déconnecté</p>
<p>Rouge : <span id="scoreRed">0</span> — Bleu : <span id="scoreBlue">0</span></p>

<button onclick="connect()">Se connecter</button>
<button id="btnCalibrate" onclick="triggerCalibration()" disabled>🎯 Calibrer</button>
<button id="btnReady" onclick="confirmCalibration()" style="display:none">✅ Prêt</button>
<button id="btnRetry" onclick="triggerCalibration()" style="display:none">🔄 Relancer</button>

<br><br>
<img id="previewImg" style="display:none; max-width:100%; border:2px solid #00ff00" />

<script>
let ws = null;

const btnCalibrate = document.getElementById('btnCalibrate');
const btnReady     = document.getElementById('btnReady');
const btnRetry     = document.getElementById('btnRetry');
const previewImg   = document.getElementById('previewImg');

function connect()
{
  const proto = window.location.protocol === 'https:' ? 'wss' : 'ws';
  ws = new WebSocket(`${proto}://${window.location.host}/controller`);
  btnCalibrate.disabled = true;

  ws.onopen = () => document.getElementById('status').textContent = 'Connecté ✓';

  ws.onclose = () => {
    btnCalibrate.disabled    = true;
    btnReady.style.display   = 'none';
    btnRetry.style.display   = 'none';
    previewImg.style.display = 'none';
    document.getElementById('status').textContent = 'Déconnecté';
  };

  ws.onmessage = (e) => {
    const d = JSON.parse(e.data);

    if (d.type === 'camera_ready') {
      btnCalibrate.disabled = false;
      document.getElementById('status').textContent = '📱 Caméra prête';
    }
    if (d.type === 'calibration_preview') {
      previewImg.src           = d.image;
      previewImg.style.display = 'block';
      btnReady.style.display   = 'inline';
      btnRetry.style.display   = 'inline';
      document.getElementById('status').textContent = 'Vérifie le contour puis clique Prêt';
    }
    if (d.type === 'calibration_ok') {
      previewImg.style.display = 'none';
      btnReady.style.display   = 'none';
      btnRetry.style.display   = 'none';
      document.getElementById('status').textContent = '🟢 Match en cours';
    }
    if (d.type === 'calibration_failed') {
      previewImg.style.display = 'none';
      btnReady.style.display   = 'none';
      btnRetry.style.display   = 'none';
      document.getElementById('status').textContent = '❌ Échec détection — réessaie';
    }
    if (d.type === 'score') {
      document.getElementById('scoreRed').textContent  = d.score.red;
      document.getElementById('scoreBlue').textContent = d.score.blue;
    }
    if (d.type === 'goal') {
      alert(d.team === 'red' ? '🔴 BUT Rouge !' : '🔵 BUT Bleu !');
      if (d.score) {
        document.getElementById('scoreRed').textContent  = d.score.red;
        document.getElementById('scoreBlue').textContent = d.score.blue;
      }
    }
  };
}

function triggerCalibration()
{
  if (btnCalibrate.disabled) return;
  ws?.send(JSON.stringify({type: 'trigger_calibration'}));
  previewImg.style.display = 'none';
  btnReady.style.display   = 'none';
  btnRetry.style.display   = 'none';
  document.getElementById('status').textContent = '🔍 Détection terrain...';
}

function confirmCalibration()
{
  ws?.send(JSON.stringify({type: 'confirm_calibration'}));
  previewImg.style.display = 'none';
  btnReady.style.display   = 'none';
  btnRetry.style.display   = 'none';
  document.getElementById('status').textContent = '🟢 Match en cours';
}
</script>
</body>
</html>
