<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Caméra</title>
<script>
function getWsBase() {
  const proto    = window.location.protocol === 'https:' ? 'wss' : 'ws';
  const ws_port  = parseInt(window.location.port || (proto === 'wss' ? 443 : 80)) + 1;
  return `${proto}://${window.location.hostname}:${ws_port}`;
}
</script>
</head>
<body>

<h2>BabyFoot — Caméra</h2>

<p id="status">Déconnecté</p>
<p id="terrainStatus">Terrain non calibré</p>

<button id="btnStart" onclick="start()">Démarrer</button>
<button id="btnStop" onclick="stop()" style="display:none">Arrêter</button>

<br><br>
<video id="video" autoplay playsinline muted style="display:none"></video>
<canvas id="preview" style="max-width:100%; display:none"></canvas>

<script>
let ws = null, running = false, stream = null;
let calibrated = false;

const video   = document.getElementById('video');
const preview = document.getElementById('preview');
const pCtx    = preview.getContext('2d');

const REPLAY_BEFORE = 10;
const REPLAY_AFTER  = 10;
const frameBuffer   = [];

window.addEventListener('beforeunload', stop);

function showPreview(corners)
{
  const W = video.videoWidth, H = video.videoHeight;
  preview.width  = W;
  preview.height = H;
  pCtx.drawImage(video, 0, 0, W, H);

  if (!corners) {
    preview.style.display = 'none';
    return;
  }

  const [tl, tr, br, bl] = corners;
  pCtx.beginPath();
  pCtx.moveTo(tl[0], tl[1]);
  pCtx.lineTo(tr[0], tr[1]);
  pCtx.lineTo(br[0], br[1]);
  pCtx.lineTo(bl[0], bl[1]);
  pCtx.closePath();
  pCtx.strokeStyle = '#00ff00';
  pCtx.lineWidth   = 3;
  pCtx.stroke();
  preview.style.display = 'block';
}

function capturePreview()
{
  const W = video.videoWidth, H = video.videoHeight;
  const c = document.createElement('canvas');
  c.width = W; c.height = H;
  c.getContext('2d').drawImage(preview, 0, 0, W, H);
  return c.toDataURL('image/jpeg', 0.7);
}

function captureFrame()
{
  const W = video.videoWidth, H = video.videoHeight;
  const c = document.createElement('canvas');
  c.width = W; c.height = H;
  c.getContext('2d').drawImage(video, 0, 0, W, H);
  return c.toDataURL('image/jpeg', 0.7);
}

function captureFrameSmall()
{
  const W = Math.round(video.videoWidth / 2);
  const H = Math.round(video.videoHeight / 2);
  const c = document.createElement('canvas');
  c.width = W; c.height = H;
  c.getContext('2d').drawImage(video, 0, 0, W, H);
  return c.toDataURL('image/jpeg', 0.4);
}

function calibrate()
{
  document.getElementById('terrainStatus').textContent = 'Détection...';
  ws?.send(JSON.stringify({
    type:         'calibration_frame',
    image:        captureFrame(),
    frame_width:  video.videoWidth,
    frame_height: video.videoHeight,
  }));
}

let trackingLoop = null;

function startTracking()
{
  if (trackingLoop !== null) return;

  function loop() {
    if (!running || !calibrated) {
      trackingLoop = null;
      return;
    }

    const frame = captureFrameSmall();
    frameBuffer.push(frame);
    if (frameBuffer.length > REPLAY_BEFORE) frameBuffer.shift();

    ws?.send(JSON.stringify({
      type:  'frame',
      image: frame,
      ts:    Date.now(),
    }));

    trackingLoop = setTimeout(() => requestAnimationFrame(loop), 100);
  }

  requestAnimationFrame(loop);
}

async function start()
{
  document.getElementById('btnStart').disabled = true;

  try {
    // stream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: 'environment' } });
    // video.srcObject = stream;

    video.src = '/test.mp4';
    video.loop = false;
    video.addEventListener('ended', () => {
      running = false;
      document.getElementById('status').textContent = 'Vidéo terminée';
    });
    video.muted = true;
    await video.play();

    const wsUrl = `${getWsBase()}/camera`;

    function setupSocket()
    {
      ws = new WebSocket(wsUrl);

      ws.onopen = () => {
        document.getElementById('status').textContent = 'Connecté ✓';
      };

      ws.onclose = () => {
        document.getElementById('status').textContent = 'Déconnecté — reconnexion...';
        if (running) setTimeout(setupSocket, 2000);
      };

      ws.onmessage = (e) => {
        const d = JSON.parse(e.data);

        if (d.type === 'start_calibration') {
          calibrate();
        }

        else if (d.type === 'calibration_preview') {
          showPreview(d.corners);
          ws?.send(JSON.stringify({
            type:         'calibration_preview',
            image:        capturePreview(),
            corners:      d.corners,
            frame_width:  video.videoWidth,
            frame_height: video.videoHeight,
          }));
          document.getElementById('terrainStatus').textContent = 'Vérifie le contour puis clique Prêt';
        }

        else if (d.type === 'calibration_failed') {
          document.getElementById('terrainStatus').textContent = 'Terrain non détecté';
          showPreview(null);
        }

        else if (d.type === 'calibration_ok') {
          calibrated = true;
          showPreview(null);
          document.getElementById('terrainStatus').textContent = 'Terrain calibré ✓';
          startTracking();
        }

        else if (d.type === 'send_replay') {
          const beforeFrames = [...frameBuffer];
          let remaining      = REPLAY_AFTER;
          const afterFrames  = [];

          const interval = setInterval(() => {
            afterFrames.push(captureFrameSmall());
            if (--remaining === 0) {
              clearInterval(interval);
              ws?.send(JSON.stringify({
                type:   'replay',
                frames: [...beforeFrames, ...afterFrames],
              }));
            }
          }, 100);
        }
      };
    }

    setupSocket();
    running = true;
    document.getElementById('btnStart').style.display = 'none';
    document.getElementById('btnStop').style.display  = 'inline';

  } catch (err) {
    stream?.getTracks().forEach(t => t.stop());
    stream = null;
    document.getElementById('status').textContent = '❌ Erreur : ' + err.message;
    document.getElementById('btnStart').disabled  = false;
  }
}

function stop()
{
  running    = false;
  calibrated = false;
  if (trackingLoop !== null) { clearTimeout(trackingLoop); trackingLoop = null; }
  frameBuffer.length = 0;
  showPreview(null);
  stream?.getTracks().forEach(t => t.stop());
  stream = null;
  ws?.close();
  ws = null;
  document.getElementById('btnStart').disabled         = false;
  document.getElementById('btnStart').style.display    = 'inline';
  document.getElementById('btnStop').style.display     = 'none';
  document.getElementById('status').textContent        = 'Déconnecté';
  document.getElementById('terrainStatus').textContent = 'Terrain non calibré';
}
</script>
</body>
</html>
