<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Caméra</title>
</head>
<body>

<h2>BabyFoot — Caméra</h2>

<p id="status">Déconnecté</p>
<p id="terrainStatus">Terrain non calibré</p>

<button id="btnStart" onclick="start()">Démarrer</button>
<button id="btnStop" onclick="stop()" style="display:none">Arrêter</button>

<br><br>
<video id="video" autoplay playsinline muted style="display:none"></video>
<!-- preview canvas shows the captured frame + green corners overlay after calibrate() -->
<canvas id="preview" style="max-width:100%; display:none"></canvas>

<!-- imports onnxruntime library from CDN to run the model in the browser (cdnjs.com) -->
<!-- onnxruntime-web: we use a JavaScript API, but the computations are done natively in the browser thanks to WASM -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/onnxruntime-web/1.23.0/ort.min.js" integrity="sha512-A6Ot7qiW93XRv1tMX93Vhvlt1ysO/BMxx77BhipVszp9mByYfZ+2M+vo/ZLcTkGwkNO0J+atRybGXiiHy4yQ5Q==" crossorigin="anonymous" referrerpolicy="no-referrer"></script>

<script>
let modelRunner = null, ws = null, running = false, stream = null;
let calibrated = false;
let pendingCorners = null;

const video   = document.getElementById('video');
const preview = document.getElementById('preview');
const pCtx    = preview.getContext('2d');

window.addEventListener('beforeunload', stop);

// draws the frame + green quadrilateral on the preview canvas
function showPreview(corners)
{
  const W = video.videoWidth, H = video.videoHeight;
  preview.width  = W;
  preview.height = H;
  pCtx.drawImage(video, 0, 0, W, H); // draw current frame
  if (!corners) {
    preview.style.display = 'none';
    return;
  }
  const [tl, tr, br, bl] = corners;
  pCtx.beginPath();
  pCtx.moveTo(tl[0], tl[1]);
  pCtx.lineTo(tr[0], tr[1]);
  pCtx.lineTo(br[0], br[1]);
  pCtx.lineTo(bl[0], bl[1]);
  pCtx.closePath();
  pCtx.strokeStyle = '#00ff00';
  pCtx.lineWidth   = 3;
  pCtx.stroke();
  preview.style.display = 'block';
}

// captures current video frame + corners into a single image and returns it as a base64 string (jpeg format, quality 0.7)
function capturePreview()
{
  const W = video.videoWidth, H = video.videoHeight;
  const tempCanvas = document.createElement('canvas');
  tempCanvas.width  = W;
  tempCanvas.height = H;
  const tempCtx = tempCanvas.getContext('2d');
  tempCtx.drawImage(preview, 0, 0, W, H); // preview already has frame + corners drawn
  return tempCanvas.toDataURL('image/jpeg', 0.7);
}

function isGreen(r, g, b)
{
  const max = Math.max(r, g, b);
  const min = Math.min(r, g, b);
  if (max === 0) return false;
  const s = (max - min) / max;
  const h = max === g
    ? 60 * ((b - r) / (max - min) + 2)
    : max === r
    ? 60 * ((g - b) / (max - min) % 6)
    : 60 * ((r - g) / (max - min) + 4);
  return h >= 60 && h <= 160 && s > 0.15;
}

function detectCorners()
{
  const W = video.videoWidth, H = video.videoHeight;
  const off = new OffscreenCanvas(W, H);
  off.getContext('2d').drawImage(video, 0, 0);
  const px = off.getContext('2d').getImageData(0, 0, W, H).data; // [R,G,B,A, R,G,B,A, ...]
  let tl = null, tr = null, br = null, bl = null; // [x,y]
  let minSum = Infinity, maxSum = -Infinity, minDiff = Infinity, maxDiff = -Infinity;
  let greenCount = 0;
  for (let y = 0; y < H; y++)
  {
    for (let x = 0; x < W; x++)
    {
      const i = (y * W + x) * 4;
      const r = px[i], g = px[i+1], b = px[i+2];
      if (isGreen(r, g, b))
      {
        greenCount++;
        const sum = x + y, diff = x - y;
        if (sum  < minSum)  { minSum  = sum;  tl = [x,y]; } // low x and low y
        if (sum  > maxSum)  { maxSum  = sum;  br = [x,y]; } // high x and high y
        if (diff < minDiff) { minDiff = diff; tr = [x,y]; } // low x and high y
        if (diff > maxDiff) { maxDiff = diff; bl = [x,y]; } // high x and low y
      }
    }
  }
  if (greenCount < W * H * 0.01)
  {
    console.log(`Green: ${greenCount}px / ${W*H}px total (${(greenCount/W/H*100).toFixed(1)}%)`);
    return null;
  }
  return [tl, tr, br, bl];
}

function calibrate()
{
  const el = document.getElementById('terrainStatus');
  el.textContent = 'Détection...';
  const corners = detectCorners();
  if (!corners || corners.some(c => !c)) // iterates through corners and stops when it finds true : one corner is null
  {
    el.textContent = 'Terrain non détecté';
    showPreview(null);
    ws?.send(JSON.stringify({type: 'calibration_failed'}));
    return;
  }
  pendingCorners = corners;
  showPreview(corners); // draw frame + corners on preview canvas
  const image = capturePreview();

  ws?.send(JSON.stringify({
    type:         'calibration_preview',
    image,
    corners,
    frame_width:  video.videoWidth,
    frame_height: video.videoHeight
  }));
  el.textContent = 'Vérifie le contour puis clique Prêt';
  calibrated = false;
}

const DETECT_SIZE = 640
const detectCanvas = new OffscreenCanvas(DETECT_SIZE, DETECT_SIZE);
const detectCtx    = detectCanvas.getContext('2d');
const inputTensor  = new Float32Array(3 * DETECT_SIZE * DETECT_SIZE);
async function detectBall()
{
  // modelRunner : ONNX modele runner executed with WebAssembly in the browser
  if (!modelRunner || !video.videoWidth)
    return null;
  detectCtx.drawImage(video, 0, 0, DETECT_SIZE, DETECT_SIZE);
  const px = detectCtx.getImageData(0, 0, DETECT_SIZE, DETECT_SIZE).data;
  for (let i = 0; i < DETECT_SIZE * DETECT_SIZE; i++)
  {
    // one pixel with 4 channels RGBA is converted into 3 values R,G,B normalized between 0 and 1, and stored in a tensor format [R...R, G...G, B...B]
    inputTensor[i]                    = px[i * 4]     / 255; // R
    inputTensor[i + DETECT_SIZE * DETECT_SIZE]      = px[i * 4 + 1] / 255; // G
    inputTensor[i + 2 * DETECT_SIZE * DETECT_SIZE]  = px[i * 4 + 2] / 255; // B
  }
  const res = await modelRunner.run({[modelRunner.inputNames[0]]: new ort.Tensor('float32', inputTensor, [1, 3, DETECT_SIZE, DETECT_SIZE])});
  const out = res[modelRunner.outputNames[0]].data;
  // out : [cx...cx, cy...cy, width...width, height...height, confidence...confidence]
  const ballNb = out.length / 5;
  let best = null, bestConf = 0.35;
  for (let bestBall = 0; bestBall < ballNb; bestBall++) {
    const c = out[4 * ballNb + bestBall];
    if (c > bestConf) {
      bestConf = c;
      best = {cx: out[bestBall]/DETECT_SIZE*video.videoWidth, cy: out[ballNb+bestBall]/DETECT_SIZE*video.videoHeight, conf: c};
    }
  }
  return best;
}

let detecting = false;

// detecting acts as a mutex to avoid multiple concurrent inferences, so the page doesn't get overwhelmed
async function ballCoordinatesLoop() {
  if (!running || !calibrated) return;
  if (!detecting) {
    detecting = true;
    const d = await detectBall();
    if (d)
    {
      ws?.send(JSON.stringify({ type: 'position', x: d.cx, y: d.cy, frame_width: video.videoWidth, frame_height: video.videoHeight, conf: d.conf, ts: Date.now() }));
    }
    detecting = false;
  }
  setTimeout(() => requestAnimationFrame(ballCoordinatesLoop), 100);
}

async function loadModel()
{
  const statusEl = document.getElementById('status');
  statusEl.textContent = 'Téléchargement du modèle...';

  const res = await fetch('/model.onnx'); // fetch: sends HTTP GET to the server that served the page
  if (!res.ok) throw new Error('Modèle introuvable sur le serveur');

  // the response arrives as a stream, we read it chunk by chunk to show progress
  const total  = parseInt(res.headers.get('Content-Length') || '0');
  const reader = res.body.getReader();
  const chunks = [];
  let loaded   = 0;

  while (true) {
    const { done, value } = await reader.read(); // value is a chunk (Uint8Array)
    if (done) break;
    chunks.push(value);
    loaded += value.length;
    if (total) {
      const percentage = Math.round(loaded / total * 100);
      statusEl.textContent = `Téléchargement du modèle... ${percentage}%`;
    }
  }

  // Blob: avoids manually computing total size, allocating a Uint8Array and copying each chunk into it
  // ArrayBuffer: binary container -> raw bytes (format expected by ONNX Runtime)
  const buffer = await new Blob(chunks).arrayBuffer();
  statusEl.textContent = 'Chargement du modèle...';

  // wasmPaths: tells ONNX Runtime where to find the .wasm computation engine files on the CDN
  ort.env.wasm.wasmPaths = 'https://cdnjs.cloudflare.com/ajax/libs/onnxruntime-web/1.23.0/';
  modelRunner = await ort.InferenceSession.create(buffer, { 
    executionProviders: ['webgl', 'wasm']
  });
}

async function start()
{
  document.getElementById('btnStart').disabled = true;

  try {
    await loadModel();
    // stream = await navigator.mediaDevices.getUserMedia({video: { facingMode: 'environment' }});
    // video.srcObject = stream;

    video.src  = '/test.mp4';
    video.loop = true;
    video.muted = true;
    await video.play();

    // wss is required if the page is served over https (ngrok provides https tunnels), otherwise ws is used for local testing
    const proto = window.location.protocol === 'https:' ? 'wss' : 'ws';
    const wsUrl = `${proto}://${window.location.host}/camera`;

    function setupSocket()
    {
      ws = new WebSocket(wsUrl);
      ws.onopen = () => {
        document.getElementById('status').textContent        = 'Connecté ✓';
      };
      ws.onclose = handleWsClose;
      ws.onmessage = (e) => { // message received from server
        const d = JSON.parse(e.data);
        if (d.type === 'start_calibration')
          calibrate();
        else if (d.type === 'calibration_ok') {
          calibrated = true;
          document.getElementById('terrainStatus').textContent = 'Terrain calibré ✓';
          requestAnimationFrame(ballCoordinatesLoop);
        }
      };
    }

    function handleWsClose() // loop of reconnection
    {
      document.getElementById('status').textContent = 'Déconnecté — reconnexion...';
      setTimeout(() => {
        if (running)
          setupSocket();
      }, 2000);
    }

    setupSocket();
    running = true;
    document.getElementById('btnStart').style.display = 'none';
    document.getElementById('btnStop').style.display  = 'inline';
    requestAnimationFrame(ballCoordinatesLoop);
  } catch (err) {
    stream?.getTracks().forEach(t => t.stop());
    stream = null;
    document.getElementById('status').textContent    = '❌ Erreur : ' + err.message;
    document.getElementById('btnStart').disabled = false;
  }
}

function stop()
{
  running        = false;
  calibrated     = false;
  pendingCorners = null;
  showPreview(null);
  stream?.getTracks().forEach(t => t.stop());
  stream = null;
  ws?.close();
  ws = null;
  document.getElementById('btnStart').disabled               = false;
  document.getElementById('btnStart').style.display          = 'inline';
  document.getElementById('btnStop').style.display           = 'none';
  document.getElementById('status').textContent              = 'Déconnecté';
  document.getElementById('terrainStatus').textContent       = 'Terrain non calibré';
}
</script>
</body>
</html>
